<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Course Registration System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-content">
        <h1 class="logo">📚 Student Registration</h1>
        <div class="nav-links">
          <span id="userDisplay" class="user-display"></span>
          <button id="logoutBtn" class="btn btn-logout" style="display:none;">Logout</button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Auth Section -->
      <section id="authSection" class="auth-section">
        <div class="auth-container">
          <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
          </div>

          <!-- Login Form -->
          <div id="loginTab" class="tab-content active">
            <h2>Student Login</h2>
            <form id="loginForm" onsubmit="loginStudent(event)">
              <div class="form-group">
                <label for="loginEmail">Email Address:</label>
                <input type="email" id="loginEmail" required placeholder="Enter your email">
              </div>
              <div class="form-group">
                <label for="loginPassword">Password:</label>
                <input type="password" id="loginPassword" required placeholder="Enter your password">
              </div>
              <button type="submit" class="btn btn-primary">Login</button>
            </form>
          </div>

          <!-- Register Form -->
          <div id="registerTab" class="tab-content">
            <h2>Student Registration</h2>
            <form id="registerForm" onsubmit="registerStudent(event)">
              <div class="form-group">
                <label for="regName">Full Name:</label>
                <input type="text" id="regName" required placeholder="Enter your full name">
              </div>
              <div class="form-group">
                <label for="regRoll">Roll Number:</label>
                <input type="text" id="regRoll" required placeholder="Enter your roll number">
              </div>
              <div class="form-group">
                <label for="regEmail">Email Address:</label>
                <input type="email" id="regEmail" required placeholder="Enter your email">
              </div>
              <div class="form-group">
                <label for="regPassword">Password:</label>
                <input type="password" id="regPassword" required placeholder="Enter a password (min 6 chars)">
              </div>
              <button type="submit" class="btn btn-primary">Register</button>
            </form>
          </div>
        </div>
      </section>

      <!-- Dashboard Section -->
      <section id="dashboardSection" class="dashboard-section" style="display:none;">
        <div class="dashboard-container">
          <div class="dashboard-header">
            <h2>Welcome, <span id="studentName"></span>!</h2>
            <p class="student-info">Roll Number: <span id="studentRoll"></span></p>
          </div>

          <!-- Tabs -->
          <div class="dashboard-tabs">
            <button class="dashboard-tab-btn active" onclick="switchDashboardTab('enrolled')">My Courses</button>
            <button class="dashboard-tab-btn" onclick="switchDashboardTab('available')">Browse Courses</button>
          </div>

          <!-- Enrolled Courses Tab -->
          <div id="enrolledTab" class="dashboard-tab-content active">
            <h3>Enrolled Courses</h3>
            <div id="enrolledCourses" class="courses-grid">
              <p class="no-data">No courses enrolled yet</p>
            </div>
          </div>

          <!-- Available Courses Tab -->
          <div id="availableTab" class="dashboard-tab-content">
            <h3>Available Courses</h3>
            <div id="availableCourses" class="courses-grid">
              <p class="no-data">Loading courses...</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Alert Messages -->
    <div id="alertBox" class="alert-box"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
